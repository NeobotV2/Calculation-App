name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (all packages)
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build web app
        run: pnpm --filter @workspace/saas run build
        env:
          PORT: "3000"
          BASE_PATH: "/"
